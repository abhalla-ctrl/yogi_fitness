<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#f5f2ec"/>
<title>Yogi Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#f5f2ec;--bg2:#fff;--card:#fff;--card2:#f0ede6;
  --border:#e8e3da;--accent:#2d6a4f;--accent2:#52b788;--accent3:#95d5b2;
  --orange:#e76f51;--purple:#7c6fcd;--gold:#d4a017;--pink:#e07a5f;
  --text:#1a1a1a;--muted:#8a8070;--subtle:#b5afa4;
  --shadow:0 2px 12px rgba(0,0,0,0.06);--shadow-lg:0 8px 32px rgba(0,0,0,0.1);
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--font-b);color:var(--text);overscroll-behavior:none;}
button{font-family:var(--font-b);cursor:pointer;border:none;background:none;}
input,textarea,select{font-family:var(--font-b);border:none;background:none;color:var(--text);}
input:focus,textarea:focus,select:focus{outline:none;}
textarea{resize:none;}select{-webkit-appearance:none;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:3px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes progressFill{from{width:0}to{width:var(--target-w)}}
.fade-up{animation:fadeUp 0.38s cubic-bezier(0.16,1,0.3,1) both;}
.pop-in{animation:popIn 0.32s cubic-bezier(0.34,1.56,0.64,1) both;}
.slide-up{animation:slideUp 0.36s cubic-bezier(0.16,1,0.3,1) both;}
.organic-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.organic-bg::before{content:'';position:absolute;top:-20%;right:-10%;width:65%;height:75%;background:radial-gradient(ellipse,rgba(82,183,136,0.11) 0%,transparent 70%);border-radius:50%;}
.organic-bg::after{content:'';position:absolute;bottom:-15%;left:-10%;width:55%;height:65%;background:radial-gradient(ellipse,rgba(212,160,23,0.08) 0%,transparent 70%);border-radius:50%;}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback,useMemo}=React;
const WORKER="https://yogi-proxy.abhalla.workers.dev";

/* ─── API ─── */
const api=async(body)=>{
  const r=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||r.status);}
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.content?.map(b=>b.text||"").join("\n")||"";
};
const callAI=(msgs,sys)=>api({model:"claude-haiku-4-5-20251001",max_tokens:900,system:sys,messages:msgs});
const callImg=(b64,mime,prompt,sys)=>api({model:"claude-haiku-4-5-20251001",max_tokens:900,system:sys,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:prompt}]}]});
const callPDF=(b64,prompt,sys)=>api({model:"claude-haiku-4-5-20251001",max_tokens:1200,system:sys,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:prompt}]}]});

/* ─── STORAGE ─── */
const K={prof:"yogi_prof_v5",sess:"yogi_sess_v2",hist:"yogi_hist_v2",saved:"yogi_saved_v1"};
const ls=(k,fb=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
const ss=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const loadProf=()=>ls(K.prof);
const saveProf=p=>ss(K.prof,p);
const loadHist=()=>ls(K.hist,[]);
const saveHist=h=>ss(K.hist,h.slice(-80));
const loadSaved=()=>ls(K.saved,[]);
const saveSaved=s=>ss(K.saved,s);

/* ─── UTILS ─── */
const ft=()=>new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
const fd=()=>new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
const fdS=d=>new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});

/* ─── PROFILE SCORE ─── */
const profileScore=(p)=>{
  if(!p) return 0;
  const fields=["prenom","sexe","age","taille","poids","niveau","objectif","equipement","regime","modVie"];
  const bonus=["blessures","contraintes","ethnie","bilanSanguin","objectifDetail"];
  let s=fields.filter(f=>p[f]).length*(70/fields.length);
  s+=bonus.filter(f=>p[f]).length*(30/bonus.length);
  return Math.round(Math.min(s,100));
};

/* ─── SYSTEM PROMPT ─── */
const buildSys=(p)=>{
  const bmi=p?.poids&&p?.taille?(p.poids/((p.taille/100)**2)).toFixed(1):null;
  const prof=p?.prenom?`PROFIL: ${p.prenom}, ${p.sexe||"?"}, ${p.age||"?"}ans, ${p.taille||"?"}cm/${p.poids||"?"}kg${bmi?` IMC${bmi}`:""}
Niveau: ${p.niveau||"?"} | Objectif: ${p.objectif||"?"}${p.objectifDetail?` (${p.objectifDetail})`:""}
Équipement: ${p.equipement||"non précisé"} | Mode de vie: ${p.modVie||"?"}
Régime: ${p.regime||"omnivore"}${p.allergies?` | Allergies: ${p.allergies}`:""}
Blessures: ${p.blessures||"aucune"} | Contraintes médicales: ${p.contraintes||"aucune"}${p.bilanSanguin?`\nBilan: ${p.bilanSanguin.slice(0,200)}`:""}${p.evenement?`\nÉvénement: ${p.evenement}${p.dateEvenement?` le ${p.dateEvenement}`:""}`:""}`:"Profil non renseigné.";

  return `Tu es Yogi Fitness — coach holistique IA (fitness NSCA + nutritionniste + ayurvéda).
${prof}

STYLE IMPÉRATIF — coach humain, pas un robot :
• Court et direct. 3-8 lignes pour une question simple.
• Jamais de rappel du profil dans la réponse. Tu le connais, utilise-le en silence.
• Tutoie par le prénom.
• Pas de markdown excessif.

FORMAT SÉANCE STRICT (max 45 min, 4-6 exercices) :
💪 [Titre] — [X] min — [lieu]
Échauff. (5 min) : [exercices courts]
—
[Exercice 1] — [séries×reps] — [repos]s ↳ [1 cue]${p?.contraintes||p?.blessures?"\n  ⚠️ [adaptation si besoin]":""}
[Exercice 2-5...]
—
Cool-down (3 min) : [étirements]
RPE : X/10

FORMAT LISTE DE COURSES :
🛒 Liste de courses — [nb personnes] pers. — [X] jours
[Catégorie] : [items avec quantités]
💰 Budget estimé : Xeur
✅ [conseil nutrition court]

ADAPTATIONS MÉDICALES si contraintes : Diabète→zone2+timing, Arthrose→0impact, HTA→pasValsalva, Rhumato→adapte douleur.
LANGUE : réponds dans la langue du message. MÉDICAL : renvoie au médecin.`;
};

const NUTRI_SYS=`Expert nutrition. JSON uniquement sans markdown:
{"score":7,"emoji":"🟡","verdict":"Correct","details":"court","positifs":["p1","p2"],"negatifs":["n1"],"conseil":"conseil"}`;

/* ─── CONSTANTS ─── */
const SPORT_CATS=[{id:"muscu",l:"Muscu",i:"🏋️",c:"#e76f51"},{id:"cardio",l:"Cardio",i:"🏃",c:"#2d6a4f"},{id:"yoga",l:"Yoga",i:"🧘",c:"#7c6fcd"},{id:"natation",l:"Natation",i:"🏊",c:"#52b788"},{id:"velo",l:"Vélo",i:"🚴",c:"#d4a017"},{id:"autre",l:"Autre",i:"⚡",c:"#e07a5f"}];
const OBJECTIFS=[{id:"masse",label:"💪 Prise de masse",sub:"Muscle"},{id:"seche",label:"🔥 Sèche",sub:"Minceur"},{id:"athlete",label:"⚡ Athlétique",sub:"Force+définition"},{id:"force",label:"🏆 Force",sub:"Perfs max"},{id:"endurance",label:"🏃 Endurance",sub:"Cardio"},{id:"sante",label:"🌿 Santé",sub:"Équilibre"},{id:"event",label:"🎯 Événement",sub:"Mariage..."},{id:"mobilite",label:"🧘 Mobilité",sub:"Souplesse"}];
const EQUIPEMENTS=["Salle complète","Haltères","Barre de traction","Élastiques","Kettlebell","Aucun matériel","Piscine","Vélo"];
const NIVEAUX=["Débutant (0-1 an)","Intermédiaire (1-3 ans)","Avancé (3-5 ans)","Expert (5+ ans)"];
const REGIMES=["Omnivore","Végétarien","Végan","Pescétarien","Keto","Halal","Casher","Sans gluten"];
const MODES_VIE=["Sédentaire","Légèrement actif","Modérément actif","Très actif","Extrêmement actif"];
const MEDIC=[{id:"diabete",l:"🩸 Diabète",c:"#d4a017",n:"Diabète"},{id:"arthrose",l:"🦴 Arthrose",c:"#e76f51",n:"Arthrose"},{id:"rhuma",l:"🔴 Rhumatismes",c:"#e07a5f",n:"Rhumatismes"},{id:"hta",l:"❤️ Hypertension",c:"#e07a5f",n:"Hypertension"},{id:"cardio",l:"🫀 Cardio-vasc.",c:"#e07a5f",n:"Maladie cardiovasculaire"},{id:"osteo",l:"🦷 Ostéoporose",c:"#52b788",n:"Ostéoporose"},{id:"asthme",l:"🫁 Asthme",c:"#7c6fcd",n:"Asthme"},{id:"surpoids",l:"⚖️ Surpoids",c:"#2d6a4f",n:"Surpoids"}];

/* ─── EXERCISE IMAGES ─── */
const EX_IMGS={"squat":"https://images.unsplash.com/photo-1574680096145-d05b474e2155?w=280&q=75","pompe":"https://images.unsplash.com/photo-1598971639058-fab3c3109a00?w=280&q=75","push":"https://images.unsplash.com/photo-1598971639058-fab3c3109a00?w=280&q=75","fente":"https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=280&q=75","lunge":"https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=280&q=75","deadlift":"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=280&q=75","soulevé":"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=280&q=75","traction":"https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?w=280&q=75","pull":"https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?w=280&q=75","développé":"https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?w=280&q=75","bench":"https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?w=280&q=75","gainage":"https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=280&q=75","planche":"https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=280&q=75","yoga":"https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=280&q=75","étirement":"https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=280&q=75","burpee":"https://images.unsplash.com/photo-1550259979-ed79b48d2a30?w=280&q=75","kettlebell":"https://images.unsplash.com/photo-1517344800994-80b20463999c?w=280&q=75","haltère":"https://images.unsplash.com/photo-1517344800994-80b20463999c?w=280&q=75","rowing":"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=280&q=75","course":"https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=280&q=75","cardio":"https://images.unsplash.com/photo-1538805060514-97d9cc17730c?w=280&q=75"};
const getImg=n=>{const lo=n.toLowerCase();for(const[k,v]of Object.entries(EX_IMGS))if(lo.includes(k))return v;return null;};

/* ─── ATOMS ─── */
const Spin=({s=18,c="var(--accent)"})=><div style={{width:s,height:s,border:`2px solid ${c}33`,borderTopColor:c,borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}}/>;
const Dots=()=><div style={{display:"flex",gap:5,padding:"12px 16px",background:"var(--card)",borderRadius:"4px 16px 16px 16px",boxShadow:"var(--shadow)",border:"1px solid var(--border)"}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"var(--accent2)",animation:"bounce 1.2s infinite",animationDelay:`${i*0.18}s`}}/>)}</div>;
const Field=({label,hint,children})=><div style={{marginBottom:16}}><div style={{fontSize:11,fontWeight:700,color:"var(--muted)",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:7}}>{label}</div>{children}{hint&&<div style={{fontSize:11,color:"var(--subtle)",marginTop:4}}>{hint}</div>}</div>;
const FInput=({style,...p})=><input {...p} style={{width:"100%",padding:"12px 15px",background:"var(--bg)",border:"1.5px solid var(--border)",borderRadius:13,color:"var(--text)",fontSize:14,...(style||{})}}/>;
const Btn=({active,color="var(--accent)",children,style,...p})=><button {...p} style={{padding:"9px 14px",borderRadius:100,border:`1.5px solid ${active?color:"var(--border)"}`,background:active?color+"15":"var(--bg)",color:active?color:"var(--muted)",fontSize:12,fontWeight:active?700:400,transition:"all 0.18s",...(style||{})}}>{children}</button>;

/* ─── PROFILE PROGRESS BAR ─── */
const ProfileBar=({profile})=>{
  const score=profileScore(profile);
  const color=score>=80?"#2d6a4f":score>=50?"#d4a017":"#e76f51";
  const label=score>=80?"Profil complet ✓":score>=50?"Profil partiel":"Profil incomplet";
  return(
    <div style={{padding:"10px 18px",background:"var(--card)",borderBottom:"1px solid var(--border)"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,alignItems:"center"}}>
        <span style={{fontSize:11,color:"var(--muted)",fontWeight:600}}>{label}</span>
        <span style={{fontSize:11,fontFamily:"var(--font-d)",fontWeight:700,color}}>{score}%</span>
      </div>
      <div style={{height:5,background:"var(--border)",borderRadius:3,overflow:"hidden"}}>
        <div style={{"--target-w":`${score}%`,width:`${score}%`,height:"100%",background:`linear-gradient(90deg,${color},${color}99)`,borderRadius:3,transition:"width 0.8s cubic-bezier(0.16,1,0.3,1)"}}/>
      </div>
      {score<80&&<div style={{fontSize:11,color:"var(--muted)",marginTop:5}}>
        {score<30?"Ajoute ton objectif et niveau →":score<60?"Complète taille/poids/équipement →":"Ajoute blessures/contraintes pour des séances parfaites →"}
      </div>}
    </div>
  );
};

/* ─── QUICK CONTEXT BUTTONS ─── */
const QuickContext=({onSelect})=>{
  const ctxs=[
    {id:"20min",icon:"⚡",label:"20 min",prompt:"Donne-moi une séance courte de 20 min maximum."},
    {id:"fatigue",icon:"😴",label:"Fatigué",prompt:"Je suis fatigué aujourd'hui, propose-moi une séance légère ou un étirement."},
    {id:"hotel",icon:"🏨",label:"Hôtel",prompt:"Je suis à l'hôtel dans une petite chambre, séance sans matériel silencieuse."},
    {id:"vacances",icon:"🏖️",label:"Vacances",prompt:"Je suis en vacances sans salle, séance plein air ou plage."},
    {id:"full",icon:"💥",label:"Full gaz",prompt:"Je suis en forme et motivé, donne-moi une séance intense."},
    {id:"maison",icon:"🏠",label:"Maison",prompt:"Je m'entraîne à la maison aujourd'hui."},
  ];
  return(
    <div style={{padding:"10px 14px 6px",borderBottom:"1px solid var(--border)",background:"rgba(245,242,236,0.8)"}}>
      <div style={{fontSize:10,fontWeight:700,color:"var(--muted)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:7}}>Contexte rapide</div>
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:4}}>
        {ctxs.map(c=>(
          <button key={c.id} onClick={()=>onSelect(c.prompt)} style={{flexShrink:0,display:"flex",alignItems:"center",gap:5,padding:"7px 12px",borderRadius:100,background:"var(--card)",border:"1.5px solid var(--border)",fontSize:12,fontWeight:500,color:"var(--text)",boxShadow:"var(--shadow)",whiteSpace:"nowrap",transition:"all 0.18s"}}>
            <span>{c.icon}</span><span>{c.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
};

/* ─── MSG CONTENT ─── */
const MsgContent=({content,onSave})=>{
  const isSession=content.includes("💪")&&(content.includes("Échauff")||content.includes("Cool-down")||content.includes("RPE"));
  const isList=content.includes("🛒")&&content.includes("Budget");
  if(!isSession&&!isList) return <div style={{fontSize:14,lineHeight:1.75,whiteSpace:"pre-wrap"}}>{content}</div>;
  const lines=content.split("\n").filter(l=>l.trim());
  return(
    <div>
      {isSession&&(
        <button onClick={()=>onSave&&onSave(content)} style={{marginBottom:10,padding:"6px 14px",background:"rgba(45,106,79,0.08)",border:"1.5px solid rgba(45,106,79,0.2)",borderRadius:100,fontSize:12,color:"var(--accent)",fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
          ♥ Sauvegarder cette séance
        </button>
      )}
      {lines.map((line,i)=>{
        const t=line.trim();
        if(t==="—"||t==="─"||t==="---") return <div key={i} style={{height:1,background:"var(--border)",margin:"8px 0"}}/>;
        if(t.startsWith("💪")||t.startsWith("🛒")) return <div key={i} style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:15,color:"var(--accent)",marginBottom:4}}>{t}</div>;
        if(t.startsWith("Échauff")||t.startsWith("Cool-down")||t.startsWith("RPE")||t.startsWith("💰")||t.startsWith("✅")) return <div key={i} style={{fontSize:12,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.04em",marginTop:4,marginBottom:2}}>{t}</div>;
        if(t.startsWith("⚠️")||t.startsWith("↳")) return <div key={i} style={{fontSize:12,color:t.startsWith("⚠️")?"var(--orange)":"var(--muted)",paddingLeft:8,marginBottom:3,lineHeight:1.5}}>{t}</div>;
        // Exercise with image
        const img=getImg(t);
        if(img&&(t.match(/×|\breps\b|séries/i)||t.length<80)) return(
          <div key={i} style={{background:"var(--bg)",borderRadius:14,overflow:"hidden",marginBottom:8,border:"1px solid var(--border)"}}>
            <img src={img} alt="" style={{width:"100%",height:90,objectFit:"cover"}} loading="lazy" onError={e=>e.target.style.display="none"}/>
            <div style={{padding:"8px 12px",fontSize:13,lineHeight:1.6}}>{t}</div>
          </div>
        );
        return <div key={i} style={{fontSize:14,lineHeight:1.7,marginBottom:2}}>{t}</div>;
      })}
    </div>
  );
};

/* ─── BUBBLE ─── */
const Bubble=({msg,onSave})=>{
  const u=msg.role==="user";
  return(
    <div className="fade-up" style={{display:"flex",justifyContent:u?"flex-end":"flex-start",margin:"4px 14px",gap:8,alignItems:"flex-end"}}>
      {!u&&<div style={{width:28,height:28,borderRadius:9,background:"linear-gradient(135deg,var(--accent),var(--accent2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>🧘</div>}
      <div style={{maxWidth:"82%"}}>
        <div style={{background:u?"var(--accent)":"var(--card)",color:u?"#fff":"var(--text)",borderRadius:u?"18px 4px 18px 18px":"4px 18px 18px 18px",padding:"11px 15px",boxShadow:u?"0 2px 12px rgba(45,106,79,0.25)":"var(--shadow)",border:u?"none":"1px solid var(--border)"}}>
          {u?<div style={{fontSize:14,lineHeight:1.7}}>{msg.content}</div>:<MsgContent content={msg.content} onSave={onSave}/>}
          {msg.isPDF&&<div style={{marginTop:6,padding:"3px 9px",background:"rgba(124,111,205,0.1)",borderRadius:8,fontSize:11,color:"var(--purple)"}}>📄 PDF analysé</div>}
        </div>
        <div style={{fontSize:10,color:"var(--subtle)",marginTop:3,textAlign:u?"right":"left"}}>{msg.time}</div>
      </div>
    </div>
  );
};

/* ─── NUTRITION SCORE ─── */
const NutriScore=({result,onClose})=>{
  const c=result.score>=8?"#2d6a4f":result.score>=5?"#d4a017":"#e76f51";
  const r=40,circ=2*Math.PI*r,off=circ-(result.score/10)*circ;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(8px)"}}>
      <div className="slide-up" style={{background:"var(--bg2)",borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxWidth:480,boxShadow:"var(--shadow-lg)"}}>
        <div style={{width:32,height:3,background:"var(--border)",borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",gap:18,alignItems:"center",marginBottom:18}}>
          <div style={{position:"relative",flexShrink:0}}>
            <svg width={90} height={90} style={{transform:"rotate(-90deg)"}}>
              <circle cx={45} cy={45} r={r} fill="none" stroke="var(--border)" strokeWidth={8}/>
              <circle cx={45} cy={45} r={r} fill="none" stroke={c} strokeWidth={8} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{transition:"stroke-dashoffset 1.2s cubic-bezier(0.16,1,0.3,1)"}}/>

/* ─── NUTRITION VIEW ─── */
function NutritionView({profile}){
  const [mode,setMode]=useState("macro");
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [typing,setTyping]=useState(false);
  const [hist,setHist]=useState([]);
  const [persons,setPersons]=useState(2);
  const [days,setDays]=useState(5);
  const [scanning,setScanning]=useState(false);
  const [scanRes,setScanRes]=useState(null);
  const photoRef=useRef();
  const endRef=useRef();
  const sys=buildSys(profile);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,typing]);

  const send=async(txt)=>{
    if(!txt.trim()||typing)return;
    setInput("");
    const uMsg={role:"user",content:txt,time:ft()};
    const nh=[...hist,{role:"user",content:txt}];
    setMsgs(p=>[...p,uMsg]);setHist(nh);setTyping(true);
    try{const r=await callAI(nh,sys);const aMsg={role:"assistant",content:r,time:ft()};setMsgs(p=>[...p,aMsg]);setHist([...nh,{role:"assistant",content:r}]);}
    catch(e){setMsgs(p=>[...p,{role:"assistant",content:`Erreur : ${e.message}`,time:ft()}]);}
    setTyping(false);
  };

  const askList=()=>{const prompt=`Génère-moi une liste de courses complète pour ${persons} personne${persons>1?"s":""} pour ${days} jour${days>1?"s":""}.${profile?.objectif?` Objectif: ${profile.objectif}.`:""}${profile?.regime&&profile.regime!=="Omnivore"?` Régime: ${profile.regime}.`:""}${profile?.allergies?` Allergies: ${profile.allergies}.`:""}
Format liste de courses strictement : 🛒 titre, catégories avec quantités précises, budget estimé.`;send(prompt);};

  const askMacros=()=>send(`Calcule mes besoins caloriques et macros journaliers précis selon mon profil. Donne-moi aussi un exemple de journée alimentaire.`);
  const askRecette=()=>send(`Propose-moi une recette healthy adaptée à mon objectif et mon régime pour ${persons} personne${persons>1?"s":""}. Avec les macros.`);
  const askPlan=()=>send(`Fais-moi un plan alimentaire sur ${days} jours pour ${persons} personne${persons>1?"s":""}. Simple, réaliste, adapté à mon objectif.`);

  const scanPhoto=async e=>{
    const f=e.target.files[0];if(!f)return;setScanning(true);
    try{const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});const raw=await callImg(b64,f.type,"Analyse cette table nutritionnelle. JSON uniquement.",NUTRI_SYS);setScanRes(JSON.parse(raw.replace(/```json|```/g,"").trim()));}
    catch{alert("Photo peu lisible.");}
    setScanning(false);e.target.value="";
  };

  const NUTRI_SYS=`Expert nutrition. JSON uniquement sans markdown:{"score":7,"emoji":"🟡","verdict":"Correct","details":"court","positifs":["p1","p2"],"negatifs":["n1"],"conseil":"conseil"}`;

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"var(--bg)",position:"relative"}}>
      <div className="organic-bg"/>
      <div style={{padding:"14px 18px 10px",position:"relative",zIndex:1}}>
        <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:22}}>Nutrition <span style={{color:"var(--accent)"}}>& Courses</span></div>
      </div>

      {/* Mode tabs */}
      <div style={{display:"flex",gap:6,padding:"0 16px 12px",position:"relative",zIndex:1}}>
        {[{id:"macro",l:"🧮 Macros"},{id:"list",l:"🛒 Courses"},{id:"scan",l:"📸 Scanner"},{id:"chat",l:"💬 Coach"}].map(t=>(
          <button key={t.id} onClick={()=>setMode(t.id)} style={{flexShrink:0,padding:"8px 13px",borderRadius:100,background:mode===t.id?"var(--accent)":"var(--card)",color:mode===t.id?"#fff":"var(--muted)",border:mode===t.id?"none":"1.5px solid var(--border)",fontSize:12,fontWeight:mode===t.id?700:500,boxShadow:mode===t.id?"0 2px 12px rgba(45,106,79,0.25)":"var(--shadow)",transition:"all 0.18s"}}>
            {t.l}
          </button>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto",position:"relative",zIndex:1}}>
        {/* MACRO TAB */}
        {mode==="macro"&&(
          <div style={{padding:"0 16px"}}>
            <div style={{background:"var(--card)",borderRadius:18,padding:18,marginBottom:12,border:"1px solid var(--border)",boxShadow:"var(--shadow)"}}>
              <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:15,marginBottom:4}}>Mes besoins nutritionnels</div>
              <div style={{fontSize:13,color:"var(--muted)",marginBottom:14}}>Calculés selon ton profil complet</div>
              {profile?.poids&&profile?.taille&&profile?.age?(()=>{
                const s=profile.sexe==="Femme"?1:0;
                const bmr=s?
                  (10*profile.poids+6.25*profile.taille-5*profile.age-161):
                  (10*profile.poids+6.25*profile.taille-5*profile.age+5);
                const act={Sédentaire:1.2,"Légèrement actif":1.375,"Modérément actif":1.55,"Très actif":1.725,"Extrêmement actif":1.9};
                const tdee=Math.round(bmr*(act[profile.modVie]||1.4));
                const obj=profile.objectif||"";
                const target=obj.includes("masse")||obj.includes("Masse")?tdee+250:obj.includes("èche")||obj.includes("poids")?tdee-400:tdee;
                const prot=Math.round((profile.poids||70)*(obj.includes("masse")||obj.includes("Masse")?2.2:2.0));
                const fat=Math.round(target*0.25/9);
                const carb=Math.round((target-prot*4-fat*9)/4);

              <button onClick={add} style={{flex:2,padding:12,background:"var(--orange)",border:"none",borderRadius:13,color:"#fff",fontWeight:700,fontSize:14,fontFamily:"var(--font-d)"}}>Enregistrer ✓</button>

          </div>
        </div>
      )}

  );

          {form.taille&&form.poids&&(()=>{const bmi=(form.poids/((form.taille/100)**2)).toFixed(1);const c=bmi<18.5?"#52b788":bmi<25?"#2d6a4f":bmi<30?"#d4a017":"#e76f51";const l=bmi<18.5?"Maigreur":bmi<25?"Normal":bmi<30?"Surpoids":"Obésité";return<div style={{background:`${c}10`,border:`1px solid ${c}25`,borderRadius:11,padding:"9px 13px",marginBottom:14,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:"var(--muted)"}}>IMC</span><span style={{fontFamily:"var(--font-d)",fontWeight:700,color:c,fontSize:14}}>{bmi} — {l}</span></div>;})()}
          <Field label="Blessures & limitations" hint="Le coach adapte tous les exercices"><textarea value={form.blessures||""} onChange={e=>set("blessures")(e.target.value)} rows={3} placeholder="Ex: Genou droit opéré 2022, hernie L4-L5..." style={{width:"100%",padding:"12px",background:"var(--bg)",border:"1.5px solid var(--border)",borderRadius:13,color:"var(--text)",fontSize:13,lineHeight:1.6}}/></Field>
          <Field label="⚠️ Contraintes médicales" hint="Chaque séance sera adaptée">
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:9}}>{MEDIC.map(tag=>{const a=(form.contrainteTags||[]).includes(tag.id);return<Btn key={tag.id} active={a} color={tag.c} onClick={()=>setForm(f=>({...f,contrainteTags:a?(f.contrainteTags||[]).filter(x=>x!==tag.id):[...(f.contrainteTags||[]),tag.id]}))}>{tag.l}</Btn>;})}</div>
            <textarea value={form.contraintesLibre||""} onChange={e=>setForm(f=>({...f,contraintesLibre:e.target.value}))} rows={2} placeholder="Autres : thyroïde, grossesse, cancer..." style={{width:"100%",padding:"11px 13px",background:"var(--bg)",border:"1.5px solid var(--border)",borderRadius:13,color:"var(--text)",fontSize:12,lineHeight:1.6}}/>
            {((form.contrainteTags||[]).length>0||form.contraintesLibre)&&<div style={{marginTop:7,padding:"7px 11px",background:"rgba(212,160,23,0.08)",borderRadius:9,border:"1px solid rgba(212,160,23,0.18)",fontSize:11,color:"#8a6200"}}>✅ Profil médical actif</div>}
          </Field>
        </div>}
        {step===2&&<div className="fade-up">
          <Field label="Niveau sportif"><div style={{display:"flex",flexDirection:"column",gap:7}}>{NIVEAUX.map(n=><button key={n} onClick={()=>set("niveau")(n)} style={{padding:"11px 15px",borderRadius:13,border:`1.5px solid ${form.niveau===n?"var(--accent)":"var(--border)"}`,background:form.niveau===n?"rgba(45,106,79,0.06)":"var(--bg)",color:form.niveau===n?"var(--accent)":"var(--text)",fontSize:13,fontWeight:form.niveau===n?600:400,textAlign:"left",transition:"all 0.18s"}}>{n}</button>)}</div></Field>
          <Field label="Équipement (multi-sélection)"><div style={{display:"flex",flexWrap:"wrap",gap:7}}>{EQUIPEMENTS.map(e=>{const s=(form.equipement||"").includes(e);return<Btn key={e} active={s} onClick={()=>{const cur=form.equipement?form.equipement.split(", ").filter(Boolean):[];set("equipement")(s?cur.filter(x=>x!==e).join(", "):[...cur,e].join(", "));}}>{e}</Btn>;})}</div></Field>
        </div>}
        {step===3&&<div className="fade-up">
          <Field label="Objectif principal"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{OBJECTIFS.map(o=><button key={o.id} onClick={()=>set("objectif")(o.label)} style={{padding:"12px 10px",borderRadius:15,border:`1.5px solid ${form.objectif===o.label?"var(--accent)":"var(--border)"}`,background:form.objectif===o.label?"rgba(45,106,79,0.06)":"var(--bg)",textAlign:"left",transition:"all 0.18s"}}><div style={{fontSize:18,marginBottom:3}}>{o.label.split(" ")[0]}</div><div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:11,color:form.objectif===o.label?"var(--accent)":"var(--text)"}}>{o.label.split(" ").slice(1).join(" ")}</div><div style={{fontSize:10,color:"var(--muted)"}}>{o.sub}</div></button>)}</div></Field>
          {form.objectif?.includes("Événement")&&<><Field label="Événement"><FInput placeholder="Mariage, compét..." value={form.evenement||""} onChange={e=>set("evenement")(e.target.value)}/></Field><Field label="Date"><FInput type="date" value={form.dateEvenement||""} onChange={e=>set("dateEvenement")(e.target.value)}/></Field></>}
          <Field label="Précisions"><textarea value={form.objectifDetail||""} onChange={e=>set("objectifDetail")(e.target.value)} rows={3} placeholder="Ex: Perdre 8kg avant l'été..." style={{width:"100%",padding:"12px",background:"var(--bg)",border:"1.5px solid var(--border)",borderRadius:13,color:"var(--text)",fontSize:13,lineHeight:1.6}}/></Field>
        </div>}
        {step===4&&<div className="fade-up">
          <Field label="Régime alimentaire"><div style={{display:"flex",flexWrap:"wrap",gap:7}}>{REGIMES.map(r=><Btn key={r} active={form.regime===r} onClick={()=>set("regime")(r)}>{r}</Btn>)}</div></Field>
          <Field label="Allergies / intolérances"><FInput placeholder="Arachides, lactose..." value={form.allergies||""} onChange={e=>set("allergies")(e.target.value)}/></Field>
          <Field label="Résultats biologiques" hint="Pour une nutrition sur-mesure"><textarea value={form.bilanSanguin||""} onChange={e=>set("bilanSanguin")(e.target.value)} rows={4} placeholder="Ferritine, Vit D, TSH, glycémie..." style={{width:"100%",padding:"12px",background:"var(--bg)",border:"1.5px solid var(--border)",borderRadius:13,color:"var(--text)",fontSize:13,lineHeight:1.6}}/></Field>
        </div>}
        <div style={{height:100}}/>
      </div>
      <div style={{padding:"10px 18px 16px",borderTop:"1px solid var(--border)",background:"rgba(245,242,236,0.97)",backdropFilter:"blur(12px)",position:"relative",zIndex:1}}>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{flex:1,padding:12,border:"1.5px solid var(--border)",borderRadius:13,color:"var(--muted)",fontSize:13,background:"transparent"}}>← Retour</button>}
          {step<4?<button onClick={()=>setStep(s=>s+1)} style={{flex:2,padding:12,background:"var(--card)",border:"1.5px solid var(--border)",borderRadius:13,color:"var(--text)",fontSize:14,fontWeight:600,boxShadow:"var(--shadow)"}}>Suivant →</button>
          :<button onClick={handleSave} style={{flex:2,padding:12,background:"var(--accent)",border:"none",borderRadius:13,color:"#fff",fontWeight:700,fontSize:15,fontFamily:"var(--font-d)",display:"flex",alignItems:"center",justifyContent:"center",gap:6,boxShadow:"0 3px 14px rgba(45,106,79,0.3)"}}>{saved?"✅ Sauvegardé !":"Sauvegarder ✓"}</button>}
        </div>
        {step<4&&<button onClick={handleSave} style={{width:"100%",padding:10,background:"transparent",border:"1.5px solid var(--accent)",borderRadius:13,color:"var(--accent)",fontSize:12,fontWeight:600}}>{saved?"✅ Sauvegardé !":"Sauvegarder maintenant"}</button>}
      </div>
    </div>
  );
}

/* ─── CHAT ─── */
function ChatView({profile,onUpdateProfile}){
  const [msgs,setMsgs]=useState(()=>loadHist());
  const [input,setInput]=useState("");
  const [typing,setTyping]=useState(false);
  const [hist,setHist]=useState(()=>loadHist().map(m=>({role:m.role,content:m.content})));
  const [isListening,setIsListening]=useState(false);
  const [voiceOk,setVoiceOk]=useState(false);
  const [showHealth,setShowHealth]=useState(false);
  const recRef=useRef();
  const endRef=useRef();
  const taRef=useRef();
  const sys=buildSys(profile);

  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SR){setVoiceOk(true);const r=new SR();r.continuous=false;r.interimResults=false;r.lang="fr-FR";r.onresult=e=>{setIsListening(false);send(e.results[0][0].transcript,true);};r.onerror=()=>setIsListening(false);r.onend=()=>setIsListening(false);recRef.current=r;}
    if(msgs.length===0){
      const hasProf=profile?.prenom&&profile?.objectif;
      const g={role:"assistant",content:hasProf?`Salut ${profile.prenom} 👋\n\nPrêt ? Dis-moi ce que tu veux faire, ou utilise un contexte rapide ci-dessous.`:`Salut 👋 Je suis Yogi Fitness.\n\nComplète ton profil (onglet 👤) pour des séances vraiment personnalisées.\n\nComment je peux t'aider ?`,time:ft()};
      setMsgs([g]);
    }
  },[]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,typing]);

  const saveSession=(content)=>{
    const title=content.split("\n")[0].replace(/[💪🧘🏋️]/g,"").trim().slice(0,50);
    const saved=loadSaved();
    const n=[{id:Date.now(),title,content,date:new Date().toLocaleDateString("fr-FR")},...saved].slice(0,20);
    saveSaved(n);
  };

  const send=async(text,isVoice=false)=>{
    const txt=(text||input).trim();if(!txt||typing)return;
    setInput("");if(taRef.current)taRef.current.style.height="auto";
    const uMsg={role:"user",content:txt,time:ft(),isVoice};
    const nh=[...hist,{role:"user",content:txt}];
    const newMsgs=[...msgs,uMsg];
    setMsgs(newMsgs);setHist(nh);setTyping(true);
    try{
      const r=await callAI(nh,sys);
      const aMsg={role:"assistant",content:r,time:ft()};
      const final=[...newMsgs,aMsg];
      setMsgs(final);setHist([...nh,{role:"assistant",content:r}]);
      saveHist(final);
      if(isVoice&&window.speechSynthesis){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(r.replace(/[*#_•·━💪🧘🏋️🔥]/g,"").slice(0,400));u.lang="fr-FR";u.rate=1.05;window.speechSynthesis.speak(u);}
    }catch(e){setMsgs(p=>[...p,{role:"assistant",content:`Oups 😕 ${e.message}`,time:ft()}]);}
    setTyping(false);
  };

  const handleHealth=async data=>{
    setTyping(true);
    try{
      let reply,uMsg,nh;
      if(data.type==="pdf"){
        uMsg={role:"user",content:`📄 Bilan importé : ${data.fileName}`,time:ft(),isPDF:true};
        const prompt="Analyse ce document santé. Résume les points clés, indique ce qui est hors norme et comment adapter mes séances et nutrition. Renvoie au médecin si besoin.";
        reply=await callPDF(data.b64,prompt,sys);
        nh=[...hist,{role:"user",content:`[PDF: ${data.fileName}]`},{role:"assistant",content:reply}];
        const upd={...(profile||{}),bilanSanguin:`PDF: ${data.fileName}`};saveProf(upd);onUpdateProfile(upd);
      }else{
        uMsg={role:"user",content:"📋 Nouvelles données de santé.",time:ft()};
        nh=[...hist,{role:"user",content:`[SANTÉ]\n${data.content}`}];
        reply=await callAI(nh,sys);
        const upd={...(profile||{}),bilanSanguin:data.content};saveProf(upd);onUpdateProfile(upd);
      }
      const aMsg={role:"assistant",content:reply,time:ft(),isPDF:data.type==="pdf"};
      const final=[...msgs,uMsg,aMsg];
      setMsgs(final);setHist(nh||hist);saveHist(final);
    }catch(e){setMsgs(p=>[...p,{role:"assistant",content:`Erreur : ${e.message}`,time:ft()}]);}
    setTyping(false);
  };

  const toggleVoice=()=>{if(!recRef.current)return;if(isListening){recRef.current.stop();setIsListening(false);}else{window.speechSynthesis?.cancel();recRef.current.start();setIsListening(true);}};

  const QUICK=profile?.objectif
    ?["💪 Séance du jour","📅 Programme semaine","🥗 Repas du jour","🌿 Conseil bien-être"]
    :["💪 Programme débutant","🥗 Calculer mes macros","🌿 Conseil ayurvédique","📊 Bilan santé"];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"var(--bg)",position:"relative"}}>
      <div className="organic-bg"/>
      {/* Header */}
      <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flexShrink:0,position:"relative",zIndex:1,borderBottom:"1px solid var(--border)",background:"rgba(245,242,236,0.94)",backdropFilter:"blur(14px)"}}>
        <div style={{width:34,height:34,borderRadius:11,background:"linear-gradient(135deg,var(--accent),var(--accent2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,boxShadow:"0 2px 10px rgba(45,106,79,0.22)"}}>🧘</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:14}}>Yogi Fitness</div>
          <div style={{fontSize:10,color:"var(--accent2)",display:"flex",alignItems:"center",gap:3}}>
            <span style={{width:4,height:4,borderRadius:"50%",background:"var(--accent2)",display:"inline-block"}}/>
            {profile?.objectif?profile.objectif.split(" ").slice(1,3).join(" "):"coach holistique IA"}
          </div>
        </div>
        <button onClick={()=>setShowHealth(true)} style={{width:32,height:32,borderRadius:9,background:"rgba(124,111,205,0.1)",border:"1.5px solid rgba(124,111,205,0.18)",color:"var(--purple)",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>📋</button>
        {voiceOk&&<button onClick={toggleVoice} style={{width:32,height:32,borderRadius:9,background:isListening?"rgba(224,122,95,0.12)":"var(--card)",border:`1.5px solid ${isListening?"rgba(224,122,95,0.3)":"var(--border)"}`,color:isListening?"var(--pink)":"var(--muted)",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>🎤</button>}
        <button onClick={()=>{saveHist([]);setMsgs([]);setHist([]);}} style={{width:32,height:32,borderRadius:9,background:"var(--card)",border:"1.5px solid var(--border)",color:"var(--muted)",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>🗑</button>
      </div>

      {/* Profile bar (only if incomplete) */}
      {profileScore(profile)<60&&<ProfileBar profile={profile}/>}

      {/* Quick context */}
      <QuickContext onSelect={send}/>

      {isListening&&<div style={{background:"rgba(224,122,95,0.07)",borderBottom:"1px solid rgba(224,122,95,0.14)",padding:"7px 16px",display:"flex",alignItems:"center",gap:7,flexShrink:0,position:"relative",zIndex:1}}><div style={{width:6,height:6,borderRadius:"50%",background:"var(--pink)",animation:"pulse2 0.9s infinite"}}/><span style={{color:"var(--pink)",fontWeight:600,fontSize:12,flex:1}}>🎤 Je t'écoute...</span><button onClick={toggleVoice} style={{background:"rgba(224,122,95,0.1)",border:"1px solid rgba(224,122,95,0.2)",color:"var(--pink)",borderRadius:20,padding:"3px 10px",fontSize:11}}>Stop</button></div>}
      {showHealth&&<HealthModal onClose={()=>setShowHealth(false)} onSend={handleHealth}/>}

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 0",position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",margin:"3px 0 10px"}}><span style={{background:"var(--card)",border:"1px solid var(--border)",fontSize:10,color:"var(--muted)",padding:"3px 11px",borderRadius:100,boxShadow:"var(--shadow)"}}>{fd()}</span></div>
        {msgs.map((m,i)=><Bubble key={i} msg={m} onSave={saveSession}/>)}
        {typing&&<div style={{display:"flex",alignItems:"flex-end",gap:8,margin:"4px 14px"}}><div style={{width:28,height:28,borderRadius:9,background:"linear-gradient(135deg,var(--accent),var(--accent2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🧘</div><Dots/></div>}
        {msgs.length<=1&&!typing&&<div style={{padding:"8px 14px"}}><div style={{display:"flex",flexWrap:"wrap",gap:7}}>{QUICK.map((q,i)=><button key={i} onClick={()=>send(q)} style={{background:"var(--card)",border:"1.5px solid var(--border)",borderRadius:100,padding:"8px 14px",fontSize:12,color:"var(--text)",fontWeight:500,boxShadow:"var(--shadow)"}}>{q}</button>)}</div></div>}
        <div ref={endRef}/>
      </div>

      {/* Input */}
      <div style={{padding:"7px 11px 11px",display:"flex",gap:6,alignItems:"flex-end",flexShrink:0,position:"relative",zIndex:1,borderTop:"1px solid var(--border)",background:"rgba(245,242,236,0.96)",backdropFilter:"blur(14px)"}}>
        <div style={{flex:1,background:"var(--card)",borderRadius:18,display:"flex",padding:"8px 14px",border:"1.5px solid var(--border)",boxShadow:"var(--shadow)"}}>
          <textarea ref={taRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Message..." rows={1} style={{flex:1,fontSize:14,maxHeight:90,lineHeight:1.5,background:"transparent",color:"var(--text)"}} onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,90)+"px";}}/>
        </div>
        <button onClick={()=>send()} disabled={!input.trim()||typing} style={{width:42,height:42,borderRadius:13,border:"none",background:input.trim()&&!typing?"var(--accent)":"var(--border)",color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:input.trim()&&!typing?"0 3px 12px rgba(45,106,79,0.3)":"none",transition:"all 0.2s"}}>
          {typing?<Spin s={14} c="#fff"/>:"➤"}
        </button>
      </div>
    </div>
  );
}

          style={{width:"100%",padding:"15px",background:"var(--card)",border:`2px solid ${name.trim()?"var(--accent)":"var(--border)"}`,borderRadius:15,color:"var(--text)",fontSize:17,textAlign:"center",marginBottom:12,boxShadow:"var(--shadow)",transition:"border-color 0.2s"}}/>

function App(){

  const [profile,setProfile]=useState(loadProf);
  const [tab,setTab]=useState("chat");

  if(screen==="onboarding")return(
    <div style={{height:"100vh",maxWidth:480,margin:"0 auto",overflow:"hidden"}}>
      <Onboarding onDone={n=>{setUserName(n);const p={prenom:n};setProfile(p);saveProf(p);setScreen("app");}}/>
    </div>
  );

  const updateProfile=p=>{setProfile(p);saveProf(p);};
  const score=profileScore(profile);
  const TABS=[
    {id:"chat",l:"Coach",i:"🧘"},
    {id:"nutrition",l:"Nutrition",i:"🥗"},
    {id:"saved",l:"Favoris",i:"♥"},
    {id:"journal",l:"Journal",i:"📓"},
    {id:"share",l:"Partager",i:"📤"},
    {id:"profile",l:"Profil",i:"👤"},
  ];

  return(
    <div style={{height:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflow:"hidden"}}>
        {tab==="chat"&&<ChatView profile={profile} onUpdateProfile={updateProfile}/>}
        {tab==="nutrition"&&<NutritionView profile={profile}/>}
        {tab==="saved"&&<SavedView/>}
        {tab==="journal"&&<JournalView userName={profile?.prenom||userName}/>}
        {tab==="share"&&<ShareView profile={profile}/>}
        {tab==="profile"&&<ProfileView profile={profile} onSave={updateProfile}/>}
      </div>
      <div style={{background:"rgba(245,242,236,0.98)",borderTop:"1px solid var(--border)",display:"flex",padding:"6px 4px 14px",flexShrink:0,backdropFilter:"blur(20px)"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"4px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
            <div style={{width:34,height:34,borderRadius:10,background:tab===t.id?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,transition:"all 0.18s",boxShadow:tab===t.id?"0 2px 10px rgba(45,106,79,0.22)":"none"}}>
              {t.i}
              {t.id==="profile"&&score<60&&<div style={{position:"absolute",top:3,right:"calc(50% - 21px)",width:7,height:7,borderRadius:"50%",background:"var(--orange)",border:"2px solid var(--bg)"}}/>}
            </div>
            <span style={{fontSize:9,color:tab===t.id?"var(--accent)":"var(--muted)",fontWeight:tab===t.id?700:400,fontFamily:"var(--font-d)"}}>{t.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
