const callAI = async(messages,system)=>{
  const res=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1500,system,messages})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||res.status);}
  const d=await res.json(); if(d.error) throw new Error(d.error.message);
  return d.content?.map(b=>b.text||"").join("\n")||"";
};
const callAIWithImage = async(b64,mime,prompt,system)=>{
  const res=await fetch(WORKER,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,system,
      messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:prompt}]}]})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||res.status);}
  const d=await res.json(); if(d.error) throw new Error(d.error.message);
  return d.content?.map(b=>b.text||"").join("\n")||"";
};

// ── HEALTH MODAL ──
const HealthModal=({onClose,onSend})=>{
  const [tab,setTab]=useState("text");
  const [txt,setTxt]=useState("");
  const [loading,setLoading]=useState(false);
  const [fileName,setFileName]=useState("");
  const pdfRef=useRef(null);

  const handlePDF=async e=>{
    const file=e.target.files[0]; if(!file) return;
    setFileName(file.name); setLoading(true);
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      await onSend({type:"pdf",b64,fileName:file.name}); onClose();
    }catch{alert("Erreur PDF. Essaie un autre fichier.");}
    setLoading(false); e.target.value="";
  };

  const handleText=async()=>{
    if(!txt.trim()) return;
    setLoading(true); await onSend({type:"text",content:txt}); setLoading(false); onClose();
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(10px)"}}>
      <div className="slide-up" style={{background:"var(--bg2)",borderRadius:"28px 28px 0 0",padding:24,width:"100%",maxWidth:480,border:"1px solid var(--border)",borderBottom:"none",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{width:36,height:3,background:"rgba(255,255,255,0.12)",borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:20,marginBottom:4}}>Données de santé</div>
        <div style={{fontSize:13,color:"var(--muted)",marginBottom:20,lineHeight:1.6}}>Partage tes bilans pour personnaliser séances et nutrition.</div>
        <div style={{display:"flex",gap:6,marginBottom:20,background:"rgba(255,255,255,0.04)",borderRadius:14,padding:4}}>
          {[{id:"text",l:"✏️ Texte"},{id:"pdf",l:"📄 PDF"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px",borderRadius:10,background:tab===t.id?"var(--card)":"none",color:tab===t.id?"var(--text)":"var(--muted)",fontSize:13,fontWeight:tab===t.id?600:400,border:tab===t.id?"1px solid var(--border)":"1px solid transparent",transition:"all 0.2s"}}>
              {t.l}
            </button>
          ))}
        </div>
        {tab==="text"&&(
          <>
            <textarea value={txt} onChange={e=>setTxt(e.target.value)} rows={5}
              placeholder="Ex: Ferritine 12 µg/L, Vit D 18 ng/mL, TSH 2.1, glycémie 0.95..."
              style={{width:"100%",padding:"14px",background:"var(--card)",borderRadius:14,border:"1px solid var(--border)",color:"var(--text)",fontSize:14,lineHeight:1.6,marginBottom:14}}/>
            <button onClick={handleText} disabled={!txt.trim()||loading} style={{width:"100%",padding:15,background:txt.trim()?"linear-gradient(135deg,var(--accent),var(--accent2))":"var(--bg3)",border:"none",borderRadius:14,color:txt.trim()?"#0a0a0f":"var(--muted)",fontWeight:700,fontSize:15,fontFamily:"var(--font-d)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {loading?<Spin c="#0a0a0f"/>:"Analyser →"}
            </button>
          </>
        )}
        {tab==="pdf"&&(
          <>
            <input ref={pdfRef} type="file" accept="application/pdf" onChange={handlePDF} style={{display:"none"}}/>
            {!loading?(
              <div onClick={()=>pdfRef.current?.click()} style={{border:"2px dashed rgba(183,139,250,0.3)",borderRadius:20,padding:"40px 20px",textAlign:"center",cursor:"pointer",background:"rgba(183,139,250,0.04)"}}>
                <div style={{fontSize:48,marginBottom:12}}>📄</div>
                <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:16,color:"var(--purple)",marginBottom:6}}>Importer un PDF</div>
                <div style={{fontSize:13,color:"var(--muted)",marginBottom:10}}>Appuie pour sélectionner</div>
                <div style={{fontSize:11,color:"var(--muted)",opacity:0.7}}>Bilans sanguins · IRM · Analyses · Compte-rendus</div>
              </div>
            ):(
              <div style={{border:"2px solid rgba(183,139,250,0.3)",borderRadius:20,padding:"40px 20px",textAlign:"center",background:"rgba(183,139,250,0.06)"}}>
                <Spin s={36} c="var(--purple)"/>
                <div style={{marginTop:16,fontFamily:"var(--font-d)",fontSize:15,color:"var(--purple)"}}>Analyse en cours...</div>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:6}}>{fileName}</div>
              </div>
            )}
          </>
        )}
        <button onClick={onClose} style={{width:"100%",marginTop:14,padding:13,background:"transparent",border:"1px solid var(--border)",borderRadius:14,color:"var(--muted)",fontSize:14}}>Annuler</button>
      </div>
    </div>
  );
};

// ── PROFILE VIEW ──

    saveProfile(form); onSave(form);

    {title:"Identité",icon:"👤"},
    {title:"Santé",icon:"🏥"},

    {title:"Objectif",icon:"🎯"},

      </div>

      {/* Steps indicator */}
      <div style={{display:"flex",gap:6,padding:"0 20px 16px",position:"relative",zIndex:1}}>
        {steps.map((s,i)=>(
          <button key={i} onClick={()=>setStep(i)} style={{flex:1,padding:"8px 4px",borderRadius:12,border:"none",background:step===i?"rgba(168,255,120,0.12)":"var(--card)",borderColor:step===i?"rgba(168,255,120,0.25)":"var(--border)",borderStyle:"solid",borderWidth:1,cursor:"pointer"}}>

            <Field label="Sexe">
              <div style={{display:"flex",gap:8}}>
                {["Homme","Femme","Autre"].map(s=>(
                  <button key={s} onClick={()=>set("sexe")(s)} style={{flex:1,padding:"12px",borderRadius:14,border:`1.5px solid ${form.sexe===s?"var(--accent)":"var(--border)"}`,background:form.sexe===s?"rgba(168,255,120,0.1)":"var(--card)",color:form.sexe===s?"var(--accent)":"var(--muted)",fontSize:13,fontWeight:form.sexe===s?700:400,transition:"all 0.2s"}}>
                    {s}
                  </button>
                ))}
              </div>
            </Field>
            <Field label="Âge"><Input type="number" placeholder="Âge en années" value={form.age||""} onChange={e=>set("age")(e.target.value)}/></Field>
            <Field label="Origine / Ethnie" hint="Permet d'adapter les prédispositions génétiques et besoins nutritionnels">
              <Input placeholder="Ex: Africaine, Asiatique, Européenne, Mixte..." value={form.ethnie||""} onChange={e=>set("ethnie")(e.target.value)}/>
            </Field>
            <Field label="Mode de vie">
              <Select value={form.modVie||""} onChange={e=>set("modVie")(e.target.value)} options={[{v:"",l:"Sélectionne ton mode de vie"},...MODES_VIE.map(m=>({v:m,l:m}))]}/>

        {/* STEP 1 - Physique */}
        {step===1&&(
          <div className="fade-up">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

                  {id:"rhumatismes",l:"🔴 Rhumatismes",c:"#ff7eb3"},

                        {id:"cardio",l:"Maladie cardiovasculaire"},{id:"osteoporose",l:"Ostéoporose"},

                  {id:"cardio",l:"Maladie cardiovasculaire"},{id:"osteoporose",l:"Ostéoporose"},

                ].find(t=>t.id===id)?.l||id);

                setForm(f=>({...f,contraintesLibre:freeText,contraintes:combined}));

                  return(
                    <button key={e} onClick={()=>{
                      const cur=form.equipement?form.equipement.split(", ").filter(Boolean):[];
                      const next=sel?cur.filter(x=>x!==e):[...cur,e];

                    {r}
                  </button>
                ))}
              </div>
            </Field>
            <Field label="Allergies / Intolérances alimentaires">
              <Input placeholder="Ex: Arachides, gluten, lactose..." value={form.allergies||""} onChange={e=>set("allergies")(e.target.value)}/>
            </Field>
            <Field label="Résultats biologiques (optionnel)" hint="Copie ici tes résultats sanguins pour une nutrition encore plus précise">
              <textarea value={form.bilanSanguin||""} onChange={e=>set("bilanSanguin")(e.target.value)} rows={4}
                placeholder="Ex: Ferritine 12, Vit D 18 ng/mL, TSH 2.1, cholestérol total 1.9, glycémie 0.95..."
                style={{width:"100%",padding:"13px 16px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,color:"var(--text)",fontSize:14,lineHeight:1.6}}/>
            </Field>
          </div>
        )}

        <div style={{height:100}}/>
      </div>

      {/* Actions */}
      <div style={{padding:"12px 20px 16px",borderTop:"1px solid var(--border)",background:"rgba(10,10,15,0.95)",backdropFilter:"blur(12px)",position:"relative",zIndex:1}}>
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{flex:1,padding:14,border:"1px solid var(--border)",borderRadius:14,color:"var(--muted)",fontSize:14,background:"transparent"}}>← Retour</button>}
          {step<4?(
            <button onClick={()=>setStep(s=>s+1)} style={{flex:2,padding:14,background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,color:"var(--text)",fontSize:14,fontWeight:600}}>
              Suivant →
            </button>
          ):(
            <button onClick={handleSave} style={{flex:2,padding:14,background:"linear-gradient(135deg,var(--accent),var(--accent2))",border:"none",borderRadius:14,color:"#0a0a0f",fontWeight:700,fontSize:15,fontFamily:"var(--font-d)",display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:"0 4px 20px rgba(168,255,120,0.3)"}}>
              {saved?"✅ Profil sauvegardé !":"Sauvegarder le profil"}
            </button>
          )}
        </div>
        {step<4&&(
          <button onClick={handleSave} style={{width:"100%",padding:12,background:"transparent",border:"1px solid rgba(168,255,120,0.2)",borderRadius:14,color:"var(--accent)",fontSize:13,fontWeight:600}}>
            Sauvegarder maintenant
          </button>
        )}
      </div>
    </div>
  );
}

function JournalView({userName}){
  const [sessions,setSessions]=useState(()=>{try{return JSON.parse(localStorage.getItem(SESS_KEY)||"[]");}catch{return [];}});
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({cat:"muscu",duree:45,intensite:7,notes:"",date:new Date().toISOString().split("T")[0]});
  const save=s=>{localStorage.setItem(SESS_KEY,JSON.stringify(s));setSessions(s);};
  const add=()=>{const cat=SPORT_CATS.find(c=>c.id===form.cat);save([{...form,id:Date.now(),label:cat.l,icon:cat.i,color:cat.c},...sessions]);setShowAdd(false);setForm({cat:"muscu",duree:45,intensite:7,notes:"",date:new Date().toISOString().split("T")[0]});};
  const del=id=>save(sessions.filter(s=>s.id!==id));
  const totalMin=sessions.reduce((s,e)=>s+parseInt(e.duree),0);
  const thisWeek=sessions.filter(s=>(new Date()-new Date(s.date))/86400000<=7).length;
  const avgInt=sessions.length?(sessions.reduce((s,e)=>s+parseInt(e.intensite),0)/sessions.length).toFixed(1):0;

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"var(--bg)",position:"relative"}}>
      <div className="mesh-bg"/>
      <div style={{padding:"18px 20px 14px",position:"relative",zIndex:1}}>
        <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:24,letterSpacing:"-0.02em",marginBottom:2}}>Journal <span style={{color:"var(--orange)"}}>Sport</span></div>
        <div style={{fontSize:13,color:"var(--muted)"}}>{userName} · {sessions.length} séance{sessions.length!==1?"s":""}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,padding:"0 16px 14px",position:"relative",zIndex:1}}>
        {[{v:sessions.length,l:"Séances",c:"var(--orange)"},{v:totalMin>=60?`${Math.floor(totalMin/60)}h${totalMin%60?String(totalMin%60).padStart(2,"0"):""}`:totalMin+"m",l:"Volume",c:"var(--accent)"},{v:thisWeek,l:"Ce sem.",c:"var(--purple)"},{v:avgInt||"-",l:"Intensité",c:"var(--gold)"}].map((s,i)=>(
          <div key={i} style={{background:"var(--card)",borderRadius:16,padding:"12px 8px",border:"1px solid var(--border)",textAlign:"center"}}>
            <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:17,color:s.c}}>{s.v}</div>
            <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px",position:"relative",zIndex:1}}>
        {sessions.length===0?(
          <div style={{textAlign:"center",padding:"48px 20px"}}>
            <div style={{fontSize:52,marginBottom:14}}>🏋️</div>
            <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:18,marginBottom:8}}>Aucune séance</div>
            <div style={{fontSize:14,color:"var(--muted)"}}>Commence à tracker tes entraînements !</div>
          </div>
        ):sessions.map((s,idx)=>(
          <div key={s.id} className="fade-up" style={{background:"var(--card)",borderRadius:20,padding:"14px",marginBottom:10,border:"1px solid var(--border)",display:"flex",alignItems:"center",gap:12,animationDelay:`${idx*0.03}s`}}>
            <div style={{width:46,height:46,borderRadius:14,background:s.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,border:`1px solid ${s.color}22`}}>{s.icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:14,marginBottom:2}}>{s.label}</div>
              <div style={{fontSize:12,color:"var(--muted)"}}>{fdS(s.date)} · {s.duree} min</div>
              {s.notes&&<div style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:3,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>"{s.notes}"</div>}
            </div>
            <div style={{flexShrink:0,textAlign:"right"}}>
              <div style={{fontSize:10,color:"var(--muted)",marginBottom:5}}>intensité</div>
              <div style={{display:"flex",gap:2.5}}>{Array.from({length:10},(_,n)=><div key={n} style={{width:4,height:14,borderRadius:2,background:n<s.intensite?s.color:"rgba(255,255,255,0.07)"}}/>)}</div>
            </div>
            <button onClick={()=>del(s.id)} style={{color:"rgba(255,255,255,0.12)",fontSize:20,padding:"0 0 0 6px",flexShrink:0,lineHeight:1}}>×</button>
          </div>
        ))}
        <div style={{height:90}}/>
      </div>
      <div style={{position:"absolute",bottom:18,left:16,right:16,zIndex:10}}>
        <button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:15,background:"linear-gradient(135deg,var(--orange),#e55a1a)",border:"none",borderRadius:18,color:"#fff",fontWeight:700,fontSize:16,fontFamily:"var(--font-d)",boxShadow:"0 8px 28px rgba(255,140,66,0.35)"}}>+ Nouvelle séance</button>
      </div>
      {showAdd&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(10px)"}}>
          <div className="slide-up" style={{background:"var(--bg2)",borderRadius:"28px 28px 0 0",padding:24,width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto",border:"1px solid var(--border)",borderBottom:"none"}}>
            <div style={{width:36,height:3,background:"rgba(255,255,255,0.12)",borderRadius:2,margin:"0 auto 22px"}}/>
            <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:22,marginBottom:20}}>Nouvelle séance 💪</div>
            <Field label="Type de sport">
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {SPORT_CATS.map(c=><button key={c.id} onClick={()=>setForm(f=>({...f,cat:c.id}))} style={{padding:"9px 14px",borderRadius:100,border:`1.5px solid ${form.cat===c.id?c.c:"var(--border)"}`,background:form.cat===c.id?c.c+"18":"transparent",color:form.cat===c.id?c.c:"var(--muted)",fontWeight:600,fontSize:13,transition:"all 0.15s"}}>{c.i} {c.l}</button>)}
              </div>
            </Field>
            <Field label="Date"><Input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></Field>
            <Field label={`Durée : ${form.duree} min`}>
              <input type="range" min={5} max={180} step={5} value={form.duree} onChange={e=>setForm(f=>({...f,duree:parseInt(e.target.value)}))} style={{width:"100%",accentColor:"var(--orange)",height:4}}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--muted)",marginTop:5}}><span>5 min</span><span>3h</span></div>
            </Field>
            <Field label={`Intensité : ${form.intensite}/10`}>
              <div style={{display:"flex",gap:5}}>
                {Array.from({length:10},(_,i)=>i+1).map(n=><button key={n} onClick={()=>setForm(f=>({...f,intensite:n}))} style={{flex:1,height:34,borderRadius:8,border:"none",background:n<=form.intensite?"var(--orange)":"rgba(255,255,255,0.06)",color:n<=form.intensite?"#fff":"rgba(255,255,255,0.2)",fontSize:12,fontWeight:700,transition:"all 0.1s"}}>{n}</button>)}
              </div>
            </Field>
            <Field label="Notes">
              <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="PR, sensations, exercices clés..." rows={2} style={{width:"100%",padding:"12px 14px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,color:"var(--text)",fontSize:13,lineHeight:1.6}}/>
            </Field>
            <div style={{display:"flex",gap:10,marginTop:6}}>
              <button onClick={()=>setShowAdd(false)} style={{flex:1,padding:14,border:"1px solid var(--border)",borderRadius:14,color:"var(--muted)",fontSize:14,background:"transparent"}}>Annuler</button>
              <button onClick={add} style={{flex:2,padding:14,border:"none",borderRadius:14,background:"linear-gradient(135deg,var(--orange),#e55a1a)",color:"#fff",fontWeight:700,fontSize:15,fontFamily:"var(--font-d)"}}>Enregistrer ✓</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CHAT ──
function ChatView({userName,profile,onUpdateProfile}){
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [typing,setTyping]=useState(false);
  const [hist,setHist]=useState([]);
  const [isListening,setIsListening]=useState(false);
  const [voiceOk,setVoiceOk]=useState(false);
  const [scanResult,setScanResult]=useState(null);
  const [scanning,setScanning]=useState(false);
  const [showHealth,setShowHealth]=useState(false);
  const recRef=useRef(null);
  const photoRef=useRef(null);
  const endRef=useRef(null);
  const taRef=useRef(null);
  const system=buildSystem(profile);

  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SR){setVoiceOk(true);const r=new SR();r.continuous=false;r.interimResults=false;r.lang="fr-FR";r.onresult=e=>{setIsListening(false);send(e.results[0][0].transcript,true);};r.onerror=()=>setIsListening(false);r.onend=()=>setIsListening(false);recRef.current=r;}
    const name=profile?.prenom||userName;
    const hasProfile=profile&&profile.prenom&&profile.objectif;
    const greet=hasProfile
      ?`Namasté ${name} 🙏\n\nTon profil est chargé — je suis prêt à te coacher selon tes objectifs.\n\n🎯 Objectif : ${profile.objectif}\n💪 Niveau : ${profile.niveau||"non précisé"}\n📍 Équipement : ${profile.equipement||"non précisé"}\n\nQue veux-tu travailler aujourd'hui ?`
      :`Namasté ${name} 🙏\n\nJe suis Yogi Fitness, ton coach holistique IA.\n\n⚠️ Ton profil n'est pas encore renseigné. Va dans l'onglet 👤 pour le compléter — ça me permet de créer des séances vraiment personnalisées.\n\nEn attendant, dis-moi comment je peux t'aider !`;
    setTimeout(()=>{const g={role:"assistant",content:greet,time:ft()};setMsgs([g]);setHist([{role:"assistant",content:greet}]);},400);
  },[]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,typing]);

  const send=async(text,isVoice=false)=>{
    const txt=(text||input).trim();if(!txt||typing)return;
    setInput("");if(taRef.current)taRef.current.style.height="auto";
    const uMsg={role:"user",content:txt,time:ft(),isVoice};
    const nh=[...hist,{role:"user",content:txt}];
    setMsgs(p=>[...p,uMsg]);setHist(nh);setTyping(true);
    try{
      const reply=await callAI(nh,system);
      setMsgs(p=>[...p,{role:"assistant",content:reply,time:ft()}]);
      setHist([...nh,{role:"assistant",content:reply}]);
      if(isVoice&&window.speechSynthesis){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(reply.replace(/[*#_•·━]/g,"").slice(0,500));u.lang="fr-FR";u.rate=1.05;window.speechSynthesis.speak(u);}
    }catch(e){setMsgs(p=>[...p,{role:"assistant",content:`❌ ${e.message}`,time:ft()}]);}
    setTyping(false);
  };

  const handleHealth=async data=>{
    setTyping(true);
    try{
      let reply;
      if(data.type==="pdf"){
        const uMsg={role:"user",content:`📄 Bilan importé : ${data.fileName}`,time:ft(),isPDF:true};
        setMsgs(p=>[...p,uMsg]);
        const prompt=`Analyse ce document médical. Identifie les valeurs clés et indique lesquelles sont hors norme. Explique l'impact sur : 1) La programmation sportive (exercices à favoriser/éviter, intensité recommandée), 2) La nutrition (carences, ajustements alimentaires), 3) Le bien-être général (sommeil, stress, récupération). Pour toute interprétation médicale, invite à consulter un médecin.`;
        reply=await callAIWithPDF(data.b64,prompt,system);
        const nh=[...hist,{role:"user",content:`[BILAN PDF : ${data.fileName}]`},{role:"assistant",content:reply}];
        setMsgs(p=>[...p,{role:"assistant",content:reply,time:ft(),isPDF:true}]);setHist(nh);
        // Save to profile
        const updatedProfile={...(profile||{}),bilanSanguin:`${profile?.bilanSanguin||""}\n[PDF: ${data.fileName}] Analysé le ${new Date().toLocaleDateString("fr-FR")}`};
        saveProfile(updatedProfile);onUpdateProfile(updatedProfile);
      }else{
        const uMsg={role:"user",content:"📋 Nouvelles données de santé.",time:ft()};
        setMsgs(p=>[...p,uMsg]);
        const nh=[...hist,{role:"user",content:`[DONNÉES SANTÉ]\n${data.content}`}];
        reply=await callAI(nh,system);
        setMsgs(p=>[...p,{role:"assistant",content:reply,time:ft()}]);setHist([...nh,{role:"assistant",content:reply}]);
        const updatedProfile={...(profile||{}),bilanSanguin:data.content};
        saveProfile(updatedProfile);onUpdateProfile(updatedProfile);
      }
    }catch(e){setMsgs(p=>[...p,{role:"assistant",content:`❌ ${e.message}`,time:ft()}]);}
    setTyping(false);
  };

  const toggleVoice=()=>{if(!recRef.current)return;if(isListening){recRef.current.stop();setIsListening(false);}else{window.speechSynthesis?.cancel();recRef.current.start();setIsListening(true);}};

  const handlePhoto=async e=>{
    const file=e.target.files[0];if(!file)return;setScanning(true);
    try{const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});const raw=await callAIWithImage(b64,file.type,"Analyse cette table nutritionnelle. JSON uniquement.",NUTRITION_SYSTEM);setScanResult(JSON.parse(raw.replace(/```json|```/g,"").trim()));}
    catch{alert("Photo peu lisible. Essaie avec plus de lumière.");}
    setScanning(false);e.target.value="";
  };

  const profileComplete=profile&&profile.prenom&&profile.objectif;
  const QUICK=profileComplete
    ?["💪 Séance du jour","🏨 Séance à l'hôtel","🏠 Entraînement maison","🥗 Repas selon mon objectif"]
    :["💪 Programme sans matériel","🥗 Calculer mes macros","🌿 Remède ayurvédique","📊 Conseils nutrition"];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"var(--bg)",position:"relative"}}>
      <div className="mesh-bg"/>
      {/* Header */}
      <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0,position:"relative",zIndex:1,borderBottom:"1px solid var(--border)",background:"rgba(10,10,15,0.85)",backdropFilter:"blur(14px)"}}>
        <div style={{width:36,height:36,borderRadius:12,background:"linear-gradient(135deg,rgba(168,255,120,0.22),rgba(120,255,214,0.12))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:"1px solid rgba(168,255,120,0.2)"}}>🧘</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:15,letterSpacing:"-0.01em"}}>Yogi Fitness</div>
          <div style={{fontSize:11,color:"var(--accent)",display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:5,height:5,borderRadius:"50%",background:"var(--accent)",display:"inline-block",boxShadow:"0 0 6px var(--accent)"}}/>
            {profileComplete?`Coach de ${profile.prenom} · ${profile.objectif.split(" ").slice(1).join(" ")}`.slice(0,40):"en ligne · profil à compléter"}
          </div>
        </div>
        <input ref={photoRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}}/>
        <button onClick={()=>photoRef.current?.click()} style={{width:36,height:36,borderRadius:10,background:"rgba(255,255,255,0.05)",border:"1px solid var(--border)",color:"var(--text)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
          {scanning?<Spin s={14}/>:"📸"}
        </button>
        <button onClick={()=>setShowHealth(true)} style={{width:36,height:36,borderRadius:10,background:"rgba(183,139,250,0.1)",border:"1px solid rgba(183,139,250,0.2)",color:"var(--purple)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>📋</button>
      </div>

      {isListening&&(
        <div style={{background:"rgba(255,126,179,0.1)",borderBottom:"1px solid rgba(255,126,179,0.18)",padding:"9px 18px",display:"flex",alignItems:"center",gap:10,flexShrink:0,position:"relative",zIndex:1}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:"var(--pink)",animation:"pulse 0.9s infinite",boxShadow:"0 0 8px var(--pink)"}}/>
          <span style={{color:"var(--pink)",fontWeight:600,fontSize:13,flex:1}}>🎤 Je t'écoute...</span>
          <button onClick={toggleVoice} style={{background:"rgba(255,126,179,0.12)",border:"1px solid rgba(255,126,179,0.25)",color:"var(--pink)",borderRadius:20,padding:"4px 12px",fontSize:12}}>Arrêter</button>
        </div>
      )}

      {showHealth&&<HealthModal onClose={()=>setShowHealth(false)} onSend={handleHealth}/>}
      {scanResult&&<ScoreCard result={scanResult} onClose={()=>setScanResult(null)}/>}

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 0",position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",margin:"4px 0 14px"}}>
          <span style={{background:"var(--card)",border:"1px solid var(--border)",fontSize:11,color:"var(--muted)",padding:"5px 14px",borderRadius:100}}>{fd()}</span>
        </div>
        {!profileComplete&&(
          <div style={{margin:"0 16px 16px",padding:"14px 16px",background:"rgba(255,209,102,0.06)",borderRadius:16,border:"1px solid rgba(255,209,102,0.15)"}}>
            <div style={{fontSize:12,color:"var(--gold)",fontWeight:600,marginBottom:4}}>⚡ Profil incomplet</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",lineHeight:1.5}}>Complète ton profil (onglet 👤) pour des séances vraiment personnalisées selon ton corps et tes objectifs.</div>
          </div>
        )}
        {msgs.map((m,i)=><Bubble key={i} msg={m}/>)}
        {typing&&(
          <div style={{display:"flex",alignItems:"flex-end",gap:8,margin:"4px 16px"}}>
            <div style={{width:30,height:30,borderRadius:10,background:"linear-gradient(135deg,rgba(168,255,120,0.2),rgba(120,255,214,0.1))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🧘</div>
            <Dots/>
          </div>
        )}
        {msgs.length<=1&&!typing&&(
          <div style={{padding:"10px 16px"}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {QUICK.map((q,i)=><button key={i} onClick={()=>send(q)} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:100,padding:"9px 16px",fontSize:12,color:"rgba(255,255,255,0.65)",fontWeight:500,transition:"all 0.2s"}}>{q}</button>)}
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      {/* Input */}
      <div style={{padding:"10px 12px",display:"flex",alignItems:"flex-end",gap:8,flexShrink:0,position:"relative",zIndex:1,borderTop:"1px solid var(--border)",background:"rgba(10,10,15,0.92)",backdropFilter:"blur(14px)"}}>
        <div style={{flex:1,background:"var(--card)",borderRadius:20,display:"flex",alignItems:"flex-end",padding:"10px 16px",border:"1px solid var(--border)"}}>
          <textarea ref={taRef} value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Message, question..." rows={1}
            style={{flex:1,fontSize:15,maxHeight:100,lineHeight:1.5,background:"transparent"}}
            onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}}/>
        </div>
        {voiceOk&&<button onClick={toggleVoice} style={{width:46,height:46,borderRadius:14,border:`1px solid ${isListening?"rgba(255,126,179,0.35)":"var(--border)"}`,background:isListening?"rgba(255,126,179,0.12)":"var(--card)",color:isListening?"var(--pink)":"var(--muted)",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",flexShrink:0}}>🎤</button>}
        <button onClick={()=>send()} disabled={!input.trim()||typing}
          style={{width:46,height:46,borderRadius:14,border:input.trim()&&!typing?"none":"1px solid var(--border)",background:input.trim()&&!typing?"linear-gradient(135deg,var(--accent),var(--accent2))":"var(--card)",color:input.trim()&&!typing?"#0a0a0f":"var(--muted)",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:input.trim()&&!typing?"0 4px 16px rgba(168,255,120,0.3)":"none",transition:"all 0.25s"}}>
          {typing?<Spin s={16}/>:"➤"}
        </button>
      </div>
    </div>
  );
}

// ── ONBOARDING ──

  const [name,setName]=useState("");
  if(step===0)return(
    <div style={{height:"100%",background:"var(--bg)",display:"flex",flexDirection:"column",padding:"44px 28px 36px",position:"relative",overflow:"hidden"}}>
      <div className="mesh-bg"/>
      <div style={{position:"absolute",top:-100,right:-80,width:320,height:320,borderRadius:"50%",background:"radial-gradient(circle,rgba(168,255,120,0.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",position:"relative",zIndex:1}}>
        <div className="fade-up" style={{marginBottom:8}}>
          <div style={{fontSize:64,marginBottom:18,filter:"drop-shadow(0 0 28px rgba(168,255,120,0.35))"}}>🧘</div>
          <div style={{fontFamily:"var(--font-d)",fontWeight:900,fontSize:44,letterSpacing:"-0.04em",lineHeight:1.0,marginBottom:10}}>
            Yogi<br/><span style={{color:"var(--accent)"}}>Fitness</span>
          </div>
          <div style={{fontSize:15,color:"var(--muted)",lineHeight:1.65,maxWidth:290}}>Ton coach holistique IA — séances sur mesure, nutrition adaptée à ton profil complet.</div>
        </div>
        <div className="fade-up" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:30,animationDelay:"0.08s"}}>
          {[["💪","Fitness","Tous lieux & niveaux"],["🥗","Nutrition","Macros & recettes"],["📸","Scanner","Note /10 produits"],["📄","Bilan PDF","Coach sur tes résultats"]].map(([icon,t,s],i)=>(
            <div key={i} style={{background:"var(--card)",borderRadius:18,padding:"16px 12px",border:"1px solid var(--border)"}}>
              <div style={{fontSize:24,marginBottom:8}}>{icon}</div>
              <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:13,marginBottom:2}}>{t}</div>
              <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.4}}>{s}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="fade-up" style={{position:"relative",zIndex:1,animationDelay:"0.18s"}}>
        <button onClick={()=>setStep(1)} style={{width:"100%",padding:17,background:"linear-gradient(135deg,var(--accent),var(--accent2))",border:"none",borderRadius:18,color:"#0a0a0f",fontWeight:800,fontSize:17,fontFamily:"var(--font-d)",boxShadow:"0 8px 32px rgba(168,255,120,0.32)",marginBottom:12,letterSpacing:"0.01em"}}>Commencer →</button>
        <div style={{textAlign:"center",fontSize:11,color:"var(--muted)"}}>Gratuit · Sans inscription · 100% privé · 🌍 Multilingue</div>
      </div>
    </div>
  );
  return(
    <div style={{height:"100%",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,position:"relative"}}>
      <div className="mesh-bg"/>
      <div className="pop-in" style={{textAlign:"center",position:"relative",zIndex:1,width:"100%"}}>
        <div style={{fontSize:56,marginBottom:18}}>👋</div>
        <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:26,letterSpacing:"-0.02em",marginBottom:8}}>Comment tu t'appelles ?</div>
        <div style={{fontSize:14,color:"var(--muted)",marginBottom:30}}>Je créerai chaque conseil pour toi personnellement</div>
        <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&name.trim()&&onDone(name.trim())} placeholder="Ton prénom..." autoFocus
          style={{width:"100%",padding:"16px 20px",background:"var(--card)",border:`2px solid ${name.trim()?"rgba(168,255,120,0.4)":"var(--border)"}`,borderRadius:18,color:"var(--text)",fontSize:18,textAlign:"center",marginBottom:16,transition:"border-color 0.2s"}}/>
        <button onClick={()=>name.trim()&&onDone(name.trim())} disabled={!name.trim()}
          style={{width:"100%",padding:16,background:name.trim()?"linear-gradient(135deg,var(--accent),var(--accent2))":"var(--bg3)",border:name.trim()?"none":"1px solid var(--border)",borderRadius:16,color:name.trim()?"#0a0a0f":"var(--muted)",fontWeight:800,fontSize:16,fontFamily:"var(--font-d)",transition:"all 0.25s",boxShadow:name.trim()?"0 8px 28px rgba(168,255,120,0.28)":"none"}}>
          Allons-y ! 🚀
        </button>
      </div>
    </div>
  );
}

// ── APP ──
function App(){
  const [screen,setScreen]=useState("onboarding");
  const [userName,setUserName]=useState("");
  const [profile,setProfile]=useState(loadProfile);
  const [tab,setTab]=useState("chat");

  if(screen==="onboarding")return(
    <div style={{height:"100vh",maxWidth:480,margin:"0 auto",overflow:"hidden"}}>
      <Onboarding onDone={n=>{setUserName(n);setScreen("app");if(!profile)setProfile({prenom:n});}}/>
    </div>
  );

  const TABS=[{id:"chat",l:"Coach",i:"🧘"},{id:"journal",l:"Journal",i:"📓"},{id:"profile",l:"Profil",i:"👤"}];
  const profileComplete=profile&&profile.prenom&&profile.objectif;

  return(
    <div style={{height:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflow:"hidden"}}>
        {tab==="chat"&&<ChatView userName={userName} profile={profile} onUpdateProfile={setProfile}/>}
        {tab==="journal"&&<JournalView userName={profile?.prenom||userName}/>}
        {tab==="profile"&&<ProfileView profile={profile} onSave={p=>{setProfile(p);}}/>}
      </div>
      <div style={{background:"rgba(10,10,15,0.97)",borderTop:"1px solid var(--border)",display:"flex",padding:"8px 0 14px",flexShrink:0,backdropFilter:"blur(20px)"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"6px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:4,position:"relative"}}>
            <div style={{width:38,height:38,borderRadius:12,background:tab===t.id?"rgba(168,255,120,0.1)":"transparent",border:tab===t.id?"1px solid rgba(168,255,120,0.18)":"1px solid transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,transition:"all 0.2s"}}>
              {t.i}
              {t.id==="profile"&&!profileComplete&&<div style={{position:"absolute",top:6,right:"calc(50% - 22px)",width:7,height:7,borderRadius:"50%",background:"var(--gold)",border:"1.5px solid var(--bg)"}}/>}
            </div>
            <span style={{fontSize:10,color:tab===t.id?"var(--accent)":"var(--muted)",fontWeight:tab===t.id?700:400,fontFamily:"var(--font-d)",letterSpacing:"0.02em"}}>{t.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
